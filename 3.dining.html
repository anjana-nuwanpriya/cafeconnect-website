    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ========================================
           HERO SECTION
           ======================================== */
        .contact-hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('img/contact-hero.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 13vh;
        }

        .hero-content h1 {
            font-size: 4em;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, #fd671a, #fff);
            background-size: 200% 200%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero-tagline {
            font-size: 1.5em;
            color: #fd671a;
            font-weight: 600;
            font-style: italic;
        }

        /* ========================================
           CONTACT SECTION
           ======================================== */
        .contact-main {
            padding: 80px 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        .contact-info-section h2 {
            font-size: 2.5em;
            font-weight: 800;
            color: #fd671a;
            margin-bottom: 40px;
        }

        .contact-cards {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .contact-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #333;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .contact-card:hover {
            border-color: #fd671a;
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(253, 103, 26, 0.2);
        }

        .contact-icon {
            font-size: 2.5em;
            color: #fd671a;
            min-width: 60px;
            text-align: center;
        }

        .contact-details h3 {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .contact-details p {
            color: #ccc;
            font-size: 1.1em;
        }

        .contact-details a {
            color: #fd671a;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-details a:hover {
            color: #ff8c42;
        }

        .contact-form-section h2 {
            font-size: 2.5em;
            font-weight: 800;
            color: #fd671a;
            margin-bottom: 40px;
        }

        .contact-form {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #333;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-group.half {
            flex: 1;
        }

        label {
            display: block;
            color: #ccc;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea, select {
            width: 100%;
            padding: 15px;
            background: #333;
            border: 2px solid #555;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #fd671a;
            box-shadow: 0 0 10px rgba(253, 103, 26, 0.3);
            background: #404040;
        }

        input::placeholder, textarea::placeholder {
            color: #888;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        select { cursor: pointer; }
        select option { background: #333; color: #fff; }

        .submit-btn {
            background: linear-gradient(45deg, #fd671a, #ff8c42);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 18px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: linear-gradient(45deg, #ff8c42, #fd671a);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(253, 103, 26, 0.4);
        }

        /* ========================================
           MAP SECTION
           ======================================== */
        .map-section {
            padding: 80px 0;
            background: #111;
        }

        .map-section h2 {
            font-size: 2.5em;
            font-weight: 800;
            color: #fd671a;
            text-align: center;
            margin-bottom: 50px;
        }

        .map-container {
            width: 90%;
            max-width: 1200px;
            height: 500px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 3px solid #333;
            transition: all 0.3s ease;
        }

        .map-container:hover {
            transform: scale(1.02);
            border-color: #fd671a;
            box-shadow: 0 20px 50px rgba(253, 103, 26, 0.2);
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            filter: grayscale(20%) contrast(1.1);
            transition: filter 0.3s ease;
        }

        .map-container:hover iframe {
            filter: grayscale(0%) contrast(1.2);
        }

        /* ========================================
           SUCCESS / ERROR MESSAGES
           ======================================== */
        .success-message {
            display: none;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .error-message {
            display: none;
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        /* ========================================
           MOBILE-ONLY IMAGE HELPER
           ======================================== */
        .mobile-only {
            display: none;
            text-align: center;
        }

        .mobile-only img {
            display: inline-block;
            margin: 20px;
            max-width: 90%;
            height: auto;
        }

        @media only screen and (max-width: 768px) {
            .mobile-only {
                display: block;
            }
            .mobile-only img {
                margin: 5% 5% 5% 5%;
                display: inline-block;
                max-width: 90%;
                height: auto;
            }
        }

        /* ========================================
           RESPONSIVE DESIGN
           ======================================== */
        @media screen and (max-width: 1024px) {
            .contact-grid { grid-template-columns: 1fr; gap: 50px; }
            .contact-form { padding: 30px; }
        }

        @media screen and (max-width: 768px) {
            .contact-hero {
                background-attachment: scroll;
                min-height: 40vh;
                margin-top: 9vh;
                padding: 0 10px;
            }
            .hero-content h1 { font-size: 2.5em; }
            .hero-tagline { font-size: 1.2em; }
            .contact-main { padding: 60px 0; }
            .contact-info-section h2,
            .contact-form-section h2,
            .map-section h2 { font-size: 2em; }
            .contact-card { flex-direction: column; text-align: center; padding: 25px; }
            .contact-icon { min-width: auto; margin-bottom: 15px; }
            .form-row { flex-direction: column; gap: 15px; }
            .contact-form { padding: 25px; }
            .map-container { width: 95%; height: 350px; }
            div[style*="text-align: center;"] img {
                display: block;
                max-width: 90%;
                height: auto;
                margin: 15px auto;
            }
        }

        @media screen and (max-width: 480px) {
            .container { padding: 0 15px; }
            .hero-content h1 { font-size: 2em; }
            .hero-tagline { font-size: 1em; }
            .contact-info-section h2,
            .contact-form-section h2,
            .map-section h2 { font-size: 1.8em; }
            .contact-form { padding: 20px; }
            input, textarea, select { padding: 12px; font-size: 14px; }
            .submit-btn { padding: 15px 30px; font-size: 14px; }
            .map-container { height: 300px; }
        }
    </style>
</head>
